name: Deploy
on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build:contracts
      - run: bun run check-types

  deploy:
    needs: code-quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: prod
    steps:
      - name: Add SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$VPS_KNOWN_HOSTS" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          # The VPS has a checkout at /projects/ZaaranzujTo. Pull the exact pushed commit,
          # then build + reload. reset --hard only touches tracked files, so .env files
          # and build caches (node_modules/.next) are left intact.
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "cd /projects/ZaaranzujTo && git fetch --prune origin main && git reset --hard '$GITHUB_SHA' && bash deploy/deploy.sh"
